<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sticky header capture fixture</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    header {
      position: sticky;
      top: 0;
      background: #4595e6;
      color: white;
      padding: 16px;
      z-index: 10;
    }
    .floater {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #f85149;
      color: white;
      padding: 12px;
      border-radius: 8px;
    }
    section { padding: 24px; height: 400px; border-bottom: 1px solid #ccc; }
  </style>
</head>
<body>
  <header>Sticky header — should appear only once in the stitched capture</header>
  <div class="floater">Fixed floater — should appear only once</div>
  <section>Section 1</section>
  <section>Section 2</section>
  <section>Section 3</section>
  <section>Section 4</section>
  <section>Section 5</section>
  <section>Section 6</section>
  <section>Last section — bottom of page</section>
</body>
</html>
